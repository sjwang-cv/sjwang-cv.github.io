name: Update Google Scholar citations

on:
  schedule:
    - cron: "0 6 * * *" # daily ~16:00 AEST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install fetch dependencies
        run: pip install "curl_cffi>=0.7.0"

      - name: Fetch citation count
        env:
          # Optional: paste a browser Cookie header from scholar.google.com
          # into repo secret GOOGLE_SCHOLAR_COOKIE if Actions IPs get blocked.
          GOOGLE_SCHOLAR_COOKIE: ${{ secrets.GOOGLE_SCHOLAR_COOKIE }}
        run: python scripts/update_citations.py --soft-fail

      - name: Upload debug HTML if scrape failed
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scholar-debug
          path: data/scholar_debug.html
          if-no-files-found: ignore

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/citations.json
          if git diff --staged --quiet; then
            echo "No citation changes"
          else
            git commit -m "chore: update Google Scholar citation count"
            git push
          fi
