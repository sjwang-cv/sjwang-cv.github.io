name: Update Google Scholar citations

on:
  schedule:
    - cron: "0 6 * * *" # daily ~16:00 AEST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch citation count
        run: |
          python3 <<'PY'
          import json, re, urllib.request
          from datetime import date, timezone
          from pathlib import Path

          scholar_id = "XLziKuQAAAAJ"
          url = f"https://scholar.google.com/citations?user={scholar_id}&hl=en"
          req = urllib.request.Request(
              url,
              headers={
                  "User-Agent": (
                      "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                      "AppleWebKit/537.36 (KHTML, like Gecko) "
                      "Chrome/120.0.0.0 Safari/537.36"
                  )
              },
          )
          with urllib.request.urlopen(req, timeout=45) as resp:
              html = resp.read().decode("utf-8", errors="ignore")

          matches = re.findall(r'class="gsc_rsb_std">(\d[\d,]*)</td>', html)
          if not matches:
              raise SystemExit("Could not parse Google Scholar citations")

          citations = int(matches[0].replace(",", ""))
          out = Path("data/citations.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          payload = {
              "scholar_id": scholar_id,
              "citations": citations,
              "updated": date.today().isoformat(),
          }
          out.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          print(payload)
          PY

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/citations.json
          if git diff --staged --quiet; then
            echo "No citation changes"
          else
            git commit -m "chore: update Google Scholar citation count"
            git push
          fi
